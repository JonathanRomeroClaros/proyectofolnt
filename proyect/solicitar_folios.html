<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitud de Folios - Mi Notaría</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 font-sans flex min-h-screen">
    
    <!-- Barra Lateral (Sidebar) -->
    <aside class="w-64 bg-slate-900 text-white min-h-screen p-5">
        <h2 class="text-xl font-bold mb-8 border-b border-slate-700 pb-4"><i class="fas fa-stamp mr-2"></i> Mi Notaría</h2>
        <nav>
            <a href="notario.html" class="block py-3 px-4 text-gray-300 hover:bg-slate-800 rounded-lg mb-2 transition-colors"><i class="fas fa-book mr-2"></i> Mis Folios</a>
            <a href="solicitar_folios.html" class="block py-3 px-4 bg-blue-700 rounded-lg mb-2 shadow"><i class="fas fa-plus-circle mr-2"></i> Solicitar Folios</a>
            <a href="login.html" class="block py-3 px-4 text-red-400 hover:bg-slate-800 rounded-lg mt-8 transition-colors"><i class="fas fa-sign-out-alt mr-2"></i> Cerrar Sesión</a>
        </nav>
    </aside>

    <!-- Contenido Principal -->
    <main class="flex-1 p-8 max-w-5xl mx-auto">
        <header class="mb-8">
            <h1 class="text-2xl font-bold text-gray-800">Nueva Solicitud de Folios</h1>
            <p class="text-gray-500">Ingrese la numeración y volumen requeridos.</p>
        </header>

        <!-- Formulario integrado -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-8 mb-8">
            <!-- Agregamos el id="formSolicitud" a la etiqueta form -->
            <form id="formSolicitud">
                <div class="grid grid-cols-2 gap-6 mb-6">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Libro</label>
                        <input type="number" value="2" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 outline-none" required>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Volumen</label>
                        <input type="number" value="1" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 outline-none" required>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-6 mb-6">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Folio Inicial</label>
                        <input type="number" placeholder="Ej. 201" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 outline-none" required>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Folio Final</label>
                        <input type="number" placeholder="Ej. 400" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 outline-none" required>
                    </div>
                </div>
                
                <div class="mt-8 pt-6 border-t flex justify-end">
                    <!-- Cambiamos a type="submit" para que valide los campos antes de enviar -->
                    <button type="submit" class="text-white bg-blue-600 hover:bg-blue-700 focus:ring-4 focus:ring-blue-300 font-medium rounded-lg text-sm px-6 py-2.5 flex items-center transition-colors">
                        <i class="fas fa-paper-plane mr-2"></i> Solicitar Papelería
                    </button>
                </div>
            </form>
        </div>

        <!-- Opcional: Conservé la tabla de estado de solicitudes recientes debajo del formulario para mantener la estructura tipo Dashboard -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
            <h2 class="text-lg font-bold text-gray-800 mb-4">Estado de mis peticiones recientes</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="text-gray-400 text-xs uppercase tracking-wider border-b bg-gray-50">
                            <th class="p-4 font-semibold">ID Solicitud</th>
                            <th class="p-4 font-semibold">Rango (Inicial - Final)</th>
                            <th class="p-4 font-semibold">Fecha de Envío</th>
                            <th class="p-4 font-semibold">Estado</th>
                        </tr>
                    </thead>
                    <tbody class="text-gray-700">
                        <tr class="border-b hover:bg-gray-50">
                            <td class="p-4 font-medium text-gray-900">REQ-2026-046</td>
                            <td class="p-4">Folio 1 al 200 (Libro 1)</td>
                            <td class="p-4 text-sm text-gray-600">17 Mayo 2026</td>
                            <td class="p-4">
                                <span class="inline-flex items-center px-3 py-1 rounded-full text-sm font-medium bg-amber-100 text-amber-800 border border-amber-200">
                                    <i class="fas fa-clock mr-1.5 text-xs"></i> En Revisión
                                </span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </main>

    <!-- Script de simulación -->
    <script>
        document.getElementById('formSolicitud').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('¡Solicitud enviada con éxito! La administración del Colegio evaluará la petición de los folios ingresados.');
            this.reset(); // Limpia el formulario
        });
    </script>
</body>
</html>
