<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Intranet Notarial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen font-sans">
    <div class="bg-white p-10 rounded-xl shadow-lg w-full max-w-md border border-gray-100">
        <div class="text-center mb-8">
            <div class="bg-blue-900 text-white w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl shadow-md">
                <i class="fas fa-balance-scale"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-800">Colegio de Notarios</h1>
            <p class="text-sm text-gray-500 mt-1">Acceso seguro</p>
        </div>
        
        <form id="loginForm">
            <div class="mb-5">
                <label class="block text-sm font-semibold text-gray-700 mb-2">Correo Institucional</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                        <i class="fas fa-envelope text-gray-400"></i>
                    </div>
                    <input type="email" id="correoUsuario" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full pl-10 p-3" placeholder="usuario@colegionotarios.mx" required>
                </div>
            </div>
            <div class="mb-6">
                <label class="block text-sm font-semibold text-gray-700 mb-2">Contraseña</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                        <i class="fas fa-lock text-gray-400"></i>
                    </div>
                    <input type="password" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full pl-10 p-3" placeholder="••••••••" required>
                </div>
            </div>
            <button type="submit" class="w-full text-white bg-blue-700 hover:bg-blue-800 focus:ring-4 focus:ring-blue-300 font-medium rounded-lg text-sm px-5 py-3.5 text-center shadow transition-colors">
                Iniciar Sesión
            </button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault(); 
            
            const correo = document.getElementById('correoUsuario').value.toLowerCase();
            
            // Correos de prueba para la redirección
            if (correo === 'notario@colegionotarios.mx') {
                window.location.href = 'notario.html';
                
            } else if (correo === 'administradora@colegionotarios.mx' || correo === 'secretaria@colegionotarios.mx') {
                window.location.href = 'secretaria.html';
                
            } else {
                alert('Acceso denegado: El correo no tiene permisos para acceder.');
            }
        });
    </script>
</body>
</html>
